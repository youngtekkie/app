<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Donate · YoungTekkie</title>
  <link rel="icon" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles/styles.css"/>
</head>
<body data-page="donate">
  <main>
    <div class="container">
      <div id="app-error" style="color:crimson"></div>

      <section class="yt-section yt-section--tight">
        <div class="yt-card">
          <h1>Donation options</h1>
          <p>Choose what’s easiest. Even small support helps keep YoungTekkie improving.</p>
        </div>
      </section>

      <section class="yt-section yt-section--tight">
        <div class="yt-grid">
          <div class="yt-card" style="grid-column: span 6;">
            <h2>SumUp</h2>
            <p>Fast one-off support.</p>
            <p><a class="yt-btn yt-btn--primary" href="https://pay.sumup.com/b2c/Q8W7JIUW" target="_blank" rel="noopener">Donate via SumUp</a></p>
          </div>
          <div class="yt-card" style="grid-column: span 6;">
            <h2>BuyMeACoffee</h2>
            <p>Support ongoing updates.</p>
            <p><a class="yt-btn" href="https://buymeacoffee.com/jumialdigital" target="_blank" rel="noopener">Open BuyMeACoffee</a></p>
          </div>
        </div>
      </section>

      <section class="yt-section yt-section--tight">
        <div class="yt-card yt-card--soft">
          <h2>Bitcoin</h2>
          <p style="font-family: var(--yt-font-mono); font-size: 0.95rem; color: var(--yt-text); word-break: break-all;">bc1qm02une0vpcy86u3u5wmkegke0jf97rt8zsgstj</p>
        </div>
      </section>

    </div>
  </main>
  <script type="module" src="scripts/main.js"></script>
</body>
</html>
